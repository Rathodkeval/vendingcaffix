<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CAFFIX - Select Size</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-decor"></div>

  <div class="kiosk-container">
    <!-- Header -->
    <header class="kiosk-header">
      <div class="brand-section">
        <svg class="brand-logo-svg" viewBox="0 0 24 24">
          <path d="M2 21h18v-2H2v2zM20 8h-2V5h2V2h-2v3H4v8c0 3.31 2.69 6 6 6h4c3.31 0 6-2.69 6-6v-3h2c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-2 5c0 2.21-1.79 4-4 4h-4c-2.21 0-4-1.79-4-4V7h12v6zm2-3h-2V9h2v1z"/>
        </svg>
        <span class="brand-name">Caffix</span>
      </div>
      
      <button class="btn-nav-back" onclick="navigateToHome()">
        <svg viewBox="0 0 24 24">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span>Cancel</span>
      </button>
    </header>

    <!-- Progress Meter -->
    <div class="progress-bar-container">
      <div class="progress-header">
        <span>Customize Order</span>
        <span>Step 2 of 4</span>
      </div>
      <div class="progress-dots">
        <div class="progress-dot-step active"></div>
        <div class="progress-dot-step active"></div>
        <div class="progress-dot-step"></div>
        <div class="progress-dot-step"></div>
      </div>
    </div>

    <h2 class="selection-title">Select Cup Size</h2>

    <!-- Visual Cup row -->
    <main class="kiosk-main">
      <div class="size-selection-grid">
        <!-- Small Card -->
        <div class="size-card" data-size="Small">
          <div class="cup-graphic-wrapper">
            <div class="cup-graphic"></div>
          </div>
          <div>
            <h3 class="size-name">Small</h3>
            <p class="size-volume">150ml</p>
          </div>
          <span class="size-price">₹20</span>
        </div>

        <!-- Medium Card -->
        <div class="size-card" data-size="Medium">
          <div class="cup-graphic-wrapper">
            <div class="cup-graphic"></div>
          </div>
          <div>
            <h3 class="size-name">Medium</h3>
            <p class="size-volume">250ml</p>
          </div>
          <span class="size-price">₹30</span>
        </div>

        <!-- Large Card -->
        <div class="size-card" data-size="Large">
          <div class="cup-graphic-wrapper">
            <div class="cup-graphic"></div>
          </div>
          <div>
            <h3 class="size-name">Large</h3>
            <p class="size-volume">350ml</p>
          </div>
          <span class="size-price">₹40</span>
        </div>
      </div>

      <!-- Action Button -->
      <div style="max-width: 900px; margin: 1.5rem auto 0 auto; width: 100%;">
        <button id="size-continue-btn" class="btn-action-master">
          <span>Continue Customization</span>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
